<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عروة — إضافة مبيعة</title>
<link rel="stylesheet" href="preview-shared.css">
<style>
  .page { max-width: 720px; margin: 0 auto; padding: var(--space-5); }
  .page-header { margin-bottom: var(--space-5); }
  .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; background: var(--bg-subtle); border-radius: var(--r-md); margin-bottom: var(--space-5); }
  .seg-btn { padding: 10px; border: 0; background: transparent; color: var(--text-sec); font: 500 0.875rem 'Tajawal'; cursor: pointer; border-radius: 6px; transition: all var(--dur-fast) var(--ease-out); }
  .seg-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); font-weight: 600; }
  .form-card { padding: var(--space-5); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
  .field { margin-bottom: var(--space-4); }
  .label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .label .req { color: var(--error); }
  .helper { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .error-text { font-size: 0.75rem; color: var(--error); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .input.error { border-color: var(--error); }
  .actions { display: flex; gap: var(--space-3); justify-content: flex-start; margin-top: var(--space-5); padding-top: var(--space-4); border-top: 1px solid var(--border); }
  .mode-hint { background: var(--brand-soft); color: var(--brand-ink); padding: var(--space-3); border-radius: var(--r-md); font-size: 0.875rem; margin-bottom: var(--space-4); display: flex; gap: var(--space-2); align-items: flex-start; }
  @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .segmented { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="document.documentElement.classList.toggle('dark')" aria-label="تبديل السمة"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>

<div class="page">
  <div class="page-header">
    <div class="page-title">إضافة مبيعة جديدة</div>
    <div class="t-small">اختر نمط الإدخال المناسب ثم أدخل التفاصيل</div>
  </div>

  <div class="segmented" role="tablist">
    <button class="seg-btn" role="tab">يومي</button>
    <button class="seg-btn active" role="tab" aria-selected="true">شهري</button>
    <button class="seg-btn" role="tab">فترة</button>
  </div>

  <div class="mode-hint">
    <span>💡</span>
    <span>في النمط الشهري، أدخل إجمالي المبيعات للشهر الواحد. سيتم احتساب المتوسط اليومي تلقائياً.</span>
  </div>

  <form class="surface form-card">
    <div class="form-grid">
      <div class="field">
        <label class="label">الفرع <span class="req">*</span></label>
        <select class="input">
          <option>فرع الرياض — مول العرب</option>
          <option>فرع جدة — النخيل</option>
          <option>فرع الدمام — الظهران</option>
        </select>
      </div>
      <div class="field">
        <label class="label">رقم الفاتورة <span class="req">*</span></label>
        <input class="input" type="text" value="INV-2026-343" />
        <div class="helper">يجب أن يكون فريداً لكل فرع</div>
      </div>
      <div class="field">
        <label class="label">السنة <span class="req">*</span></label>
        <select class="input"><option>٢٠٢٦</option><option>٢٠٢٥</option></select>
      </div>
      <div class="field">
        <label class="label">الشهر <span class="req">*</span></label>
        <select class="input">
          <option>أبريل</option><option>مايو</option><option>يونيو</option>
        </select>
      </div>
      <div class="field" style="grid-column: 1 / -1;">
        <label class="label">إجمالي المبيعات (ر.س) <span class="req">*</span></label>
        <input class="input error" type="text" value="abc" />
        <div class="error-text">⚠ يجب أن تكون القيمة رقمية موجبة</div>
      </div>
      <div class="field" style="grid-column: 1 / -1;">
        <label class="label">ملاحظات (اختياري)</label>
        <textarea class="input" rows="3" placeholder="أي ملاحظات إضافية..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary">حفظ المبيعة</button>
      <button type="button" class="btn btn-ghost">إلغاء</button>
    </div>
  </form>
</div>

<script>
  document.querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-btn').forEach(b => { b.classList.remove('active'); b.removeAttribute('aria-selected'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
    });
  });
</script>
</body>
</html>
