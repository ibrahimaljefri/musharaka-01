<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 580">
  <defs>
    <!-- Metallic gold gradients -->
    <linearGradient id="i1_goldMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="35%"  stop-color="#F59E0B"/>
      <stop offset="65%"  stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="i1_goldHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFF8DC"/>
      <stop offset="40%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="i1_goldShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <radialGradient id="i1_glowRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(245,158,11,0.25)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
    <!-- Globe arc gradient — horizontal sweep for lat lines -->
    <linearGradient id="i1_goldGlobe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#92400E"/>
      <stop offset="40%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Wave specific gradients (horizontal to show metallic sheen left→right) -->
    <linearGradient id="i1_waveGold1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D97706"/>
      <stop offset="30%"  stop-color="#FDE68A"/>
      <stop offset="60%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="i1_waveHL1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#92400E"/>
      <stop offset="35%"  stop-color="#FFF8DC"/>
      <stop offset="70%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Background                           -->
  <!-- ─────────────────────────────────────────── -->
  <g id="bg">
    <rect width="560" height="580" fill="#1C2332"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Ambient glow                         -->
  <!-- ─────────────────────────────────────────── -->
  <g id="glow">
    <ellipse cx="280" cy="270" rx="220" ry="200" fill="url(#i1_glowRad)"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Light streak particles               -->
  <!-- ─────────────────────────────────────────── -->
  <g id="particles" opacity="0.4">
    <!-- Streaks radiating from globe area ~(190,100) -->
    <line x1="190" y1="100" x2="130" y2="52"  stroke="#FBBF24" stroke-width="0.8" opacity="0.45"/>
    <line x1="190" y1="100" x2="115" y2="110" stroke="#FBBF24" stroke-width="0.7" opacity="0.30"/>
    <line x1="190" y1="100" x2="155" y2="40"  stroke="#FDE68A" stroke-width="0.6" opacity="0.35"/>
    <line x1="190" y1="100" x2="240" y2="48"  stroke="#FBBF24" stroke-width="0.8" opacity="0.28"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Outer "C" arc — 3-layer metallic     -->
  <!--   Center (280,270) r=195                    -->
  <!--   start ≈ (449,172)  end ≈ (449,368)        -->
  <!--   large-arc=1, sweep=1  → 300° clockwise C  -->
  <!-- ─────────────────────────────────────────── -->
  <g id="outer-arc">
    <!-- Layer 1: outer shadow -->
    <path d="M 449,172 A 195,195 0 1,1 449,368"
          fill="none"
          stroke="#78350F"
          stroke-width="30"
          stroke-linecap="round"
          opacity="0.50"/>
    <!-- Layer 2: main body -->
    <path d="M 449,172 A 195,195 0 1,1 449,368"
          fill="none"
          stroke="url(#i1_goldMain)"
          stroke-width="22"
          stroke-linecap="round"/>
    <!-- Layer 3: inner highlight -->
    <path d="M 449,172 A 195,195 0 1,1 449,368"
          fill="none"
          stroke="url(#i1_goldHL)"
          stroke-width="9"
          stroke-linecap="round"
          opacity="0.65"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Globe wireframe at top-left of C arc -->
  <!--   Centered at (190, 100)                    -->
  <!-- ─────────────────────────────────────────── -->
  <g id="globe">
    <!-- Outer circle -->
    <circle cx="190" cy="100" r="48"
            fill="none"
            stroke="#78350F"
            stroke-width="5"
            opacity="0.45"/>
    <circle cx="190" cy="100" r="48"
            fill="none"
            stroke="url(#i1_goldMain)"
            stroke-width="1.8"/>
    <circle cx="190" cy="100" r="48"
            fill="none"
            stroke="url(#i1_goldHL)"
            stroke-width="0.8"
            opacity="0.6"/>

    <!-- Latitude arcs: 3 elliptical lines at y≈80,100,120 -->
    <!-- y=80: distance from center = 20 → semi-x = sqrt(48²-20²) ≈ 43.2 -->
    <path d="M 146.8,80 A 43.2,13 0 0,0 233.2,80"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="1.4" opacity="0.85"/>
    <path d="M 146.8,80 A 43.2,13 0 0,1 233.2,80"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="0.9" opacity="0.45"/>

    <!-- y=100: equator, full width = ±48 -->
    <path d="M 142,100 A 48,15 0 0,0 238,100"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="1.6" opacity="0.90"/>
    <path d="M 142,100 A 48,15 0 0,1 238,100"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="1.0" opacity="0.45"/>

    <!-- y=120: distance from center = 20 → same as y=80 -->
    <path d="M 146.8,120 A 43.2,13 0 0,0 233.2,120"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="1.4" opacity="0.85"/>
    <path d="M 146.8,120 A 43.2,13 0 0,1 233.2,120"
          fill="none" stroke="url(#i1_goldGlobe)" stroke-width="0.9" opacity="0.45"/>

    <!-- Longitude arcs: 3 vertical ellipses through globe -->
    <!-- Center meridian -->
    <path d="M 190,52 A 1,48 0 0,0 190,148"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="1.4" opacity="0.80"/>
    <path d="M 190,52 A 1,48 0 0,1 190,148"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="0.8" opacity="0.40"/>

    <!-- Left meridian offset ~24 -->
    <path d="M 166,54 A 20,47 0 0,0 166,146"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="1.2" opacity="0.70"/>
    <path d="M 166,54 A 20,47 0 0,1 166,146"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="0.7" opacity="0.35"/>

    <!-- Right meridian offset ~24 -->
    <path d="M 214,54 A 20,47 0 0,0 214,146"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="1.2" opacity="0.70"/>
    <path d="M 214,54 A 20,47 0 0,1 214,146"
          fill="none" stroke="url(#i1_goldMain)" stroke-width="0.7" opacity="0.35"/>

    <!-- Node dots at intersections -->
    <circle cx="190" cy="80"  r="3.2" fill="url(#i1_goldHL)" opacity="0.95"/>
    <circle cx="190" cy="100" r="3.2" fill="url(#i1_goldHL)" opacity="0.95"/>
    <circle cx="190" cy="120" r="3.2" fill="url(#i1_goldHL)" opacity="0.95"/>
    <circle cx="166" cy="100" r="2.8" fill="url(#i1_goldHL)" opacity="0.80"/>
    <circle cx="214" cy="100" r="2.8" fill="url(#i1_goldHL)" opacity="0.80"/>
    <circle cx="175" cy="82"  r="2.2" fill="url(#i1_goldHL)" opacity="0.70"/>
    <circle cx="205" cy="82"  r="2.2" fill="url(#i1_goldHL)" opacity="0.70"/>
    <circle cx="175" cy="118" r="2.2" fill="url(#i1_goldHL)" opacity="0.70"/>
    <circle cx="205" cy="118" r="2.2" fill="url(#i1_goldHL)" opacity="0.70"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: 3 flowing wave strokes forming "a"   -->
  <!-- ─────────────────────────────────────────── -->
  <g id="waves">

    <!-- WAVE 1 — top, smallest -->
    <!-- Shadow -->
    <path d="M 155,225 C 195,195 215,200 255,215 C 295,230 320,225 350,240"
          fill="none" stroke="#78350F" stroke-width="26" stroke-linecap="round" opacity="0.48"/>
    <!-- Main -->
    <path d="M 155,225 C 195,195 215,200 255,215 C 295,230 320,225 350,240"
          fill="none" stroke="url(#i1_waveGold1)" stroke-width="18" stroke-linecap="round"/>
    <!-- Highlight -->
    <path d="M 155,225 C 195,195 215,200 255,215 C 295,230 320,225 350,240"
          fill="none" stroke="url(#i1_waveHL1)" stroke-width="7" stroke-linecap="round" opacity="0.65"/>

    <!-- WAVE 2 — middle, medium -->
    <!-- Shadow -->
    <path d="M 140,272 C 180,245 205,252 250,265 C 295,278 325,272 360,282"
          fill="none" stroke="#78350F" stroke-width="28" stroke-linecap="round" opacity="0.48"/>
    <!-- Main -->
    <path d="M 140,272 C 180,245 205,252 250,265 C 295,278 325,272 360,282"
          fill="none" stroke="url(#i1_waveGold1)" stroke-width="20" stroke-linecap="round"/>
    <!-- Highlight -->
    <path d="M 140,272 C 180,245 205,252 250,265 C 295,278 325,272 360,282"
          fill="none" stroke="url(#i1_waveHL1)" stroke-width="8" stroke-linecap="round" opacity="0.65"/>

    <!-- WAVE 3 — bottom, largest, forms "a" bowl -->
    <!-- Closed bowl fill (subtle) -->
    <path d="M 148,325 C 190,298 215,308 255,318 C 295,328 325,315 358,320 L 358,342 C 325,357 295,362 255,358 C 215,354 185,348 155,337 Z"
          fill="url(#i1_goldShadow)" opacity="0.18"/>
    <!-- Shadow stroke -->
    <path d="M 148,325 C 190,298 215,308 255,318 C 295,328 325,315 358,320 L 358,342 C 325,357 295,362 255,358 C 215,354 185,348 155,337 Z"
          fill="none" stroke="#78350F" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.48"/>
    <!-- Main stroke -->
    <path d="M 148,325 C 190,298 215,308 255,318 C 295,328 325,315 358,320 L 358,342 C 325,357 295,362 255,358 C 215,354 185,348 155,337 Z"
          fill="none" stroke="url(#i1_waveGold1)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Highlight stroke -->
    <path d="M 148,325 C 190,298 215,308 255,318 C 295,328 325,315 358,320 L 358,342 C 325,357 295,362 255,358 C 215,354 185,348 155,337 Z"
          fill="none" stroke="url(#i1_waveHL1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- GROUP: Wordmark                             -->
  <!-- ─────────────────────────────────────────── -->
  <g id="wordmark">
    <!-- Shadow text -->
    <text x="281" y="522"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="36"
          font-weight="700"
          letter-spacing="5"
          text-anchor="middle"
          fill="#78350F"
          opacity="0.50">MOSHARKATECH</text>
    <!-- Main text -->
    <text x="280" y="520"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="36"
          font-weight="700"
          letter-spacing="5"
          text-anchor="middle"
          fill="url(#i1_goldMain)">MOSHARKATECH</text>
  </g>

</svg>
