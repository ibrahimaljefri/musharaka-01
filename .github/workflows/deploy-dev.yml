name: Deploy to dev.urrwah.com

# Triggers:
#   push to dev branch        → auto-deploy
#   manual via Actions UI     → workflow_dispatch
on:
  push:
    branches: [dev]
  workflow_dispatch:

# One dev deploy at a time. Don't cancel an in-progress deploy —
# rolling-cancel would leave the VPS in a half-applied state.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run deploy.sh dev on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash ~/deploy.sh dev'

      # Health check via direct port over SSH — bypasses Apache/SSL.
      # Switch to https://dev.urrwah.com/api/health once AutoSSL is active.
      - name: Verify app is healthy on port 3002
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               result=$(curl -fsS http://127.0.0.1:3002/api/health 2>/dev/null || echo "fail")
               if echo "$result" | grep -q "\"status\":\"ok\""; then
                 echo "✓ dev backend healthy on attempt $i: $result"
                 exit 0
               fi
               echo "  attempt $i: $result — waiting 5s…"
               sleep 5
             done
             echo "✗ dev backend health check failed after 30s"
             exit 1'

      # Diagnose post-deploy state: confirm new code is running and .env is readable.
      # This step is intentionally verbose to help trace the GIT_SHA propagation.
      - name: Diagnose post-deploy state
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'echo "=== GIT_SHA in server/.env ==="
             grep "GIT_SHA" ~/repos/urrwah-dev/musharaka/server/.env 2>/dev/null || echo "(not found)"
             echo "=== /api/version raw response ==="
             curl -fsS http://127.0.0.1:3002/api/version 2>/dev/null
             echo ""
             echo "=== new readEnvKey code present? ==="
             grep -c "readEnvKey" ~/repos/urrwah-dev/musharaka/server/src/index.js 2>/dev/null \
               && echo "(new code)" || echo "(OLD code — readEnvKey missing)"
             echo "=== __dirname of index.js (inferred) ==="
             ls -la ~/repos/urrwah-dev/musharaka/server/src/index.js 2>/dev/null
             echo "=== server/tmp dir ==="
             ls -la ~/repos/urrwah-dev/musharaka/server/tmp/ 2>/dev/null || echo "(no tmp dir)"
             echo "=== last 5 lines of node log ==="
             tail -5 ~/urrwah-dev-api.log 2>/dev/null || echo "(no node log)"'

      # Stamp the correct GIT_SHA into server .env, then kill the node process
      # so Passenger restarts it and picks up both the new code and new .env.
      # pkill and pgrep both exit 255 on this CloudLinux VPS (binary-level
      # restriction). We bypass them by scanning /proc/*/cmdline directly
      # to find the PID, then call kill on that specific PID.
      - name: Stamp GIT_SHA and kill node process via /proc scan
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'SERVER_ENV=~/repos/urrwah-dev/musharaka/server/.env
             # Update GIT_SHA in .env
             if [ -f "$SERVER_ENV" ]; then
               grep -v -E "^(GIT_SHA|DEPLOYED_AT)=" "$SERVER_ENV" > "$SERVER_ENV.tmp" \
                 && mv "$SERVER_ENV.tmp" "$SERVER_ENV"
             fi
             echo "GIT_SHA=${{ github.sha }}" >> "$SERVER_ENV"
             echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$SERVER_ENV"
             echo "✓ stamped GIT_SHA=${{ github.sha }}"
             # Also touch restart.txt as belt-and-suspenders
             mkdir -p ~/repos/urrwah-dev/musharaka/server/tmp \
               && touch ~/repos/urrwah-dev/musharaka/server/tmp/restart.txt \
               && echo "✓ touched restart.txt"
             # Find the node process via /proc (avoids pkill/pgrep which exit 255)
             NODE_PID=""
             for f in /proc/[0-9]*/cmdline; do
               cmd=$(cat "$f" 2>/dev/null | tr '"'"'\0'"'"' '"'"' '"'"')
               if echo "$cmd" | grep -q "musharaka/server/src/index.js"; then
                 NODE_PID=$(echo "$f" | cut -d/ -f3)
                 break
               fi
             done
             if [ -n "$NODE_PID" ]; then
               kill "$NODE_PID" 2>/dev/null \
                 && echo "✓ killed node PID $NODE_PID via /proc scan — Passenger will restart" \
                 || echo "⚠ kill $NODE_PID returned non-zero"
             else
               echo "ℹ node PID not found in /proc — restart.txt is in effect"
             fi'

      # Wait for the app to come back up after the bounce, then verify SHA.
      # Use grep/cut to parse JSON; avoids depending on `node` being in SSH PATH.
      - name: Verify deployed SHA matches this commit
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               sha=$(curl -fsS http://127.0.0.1:3002/api/version 2>/dev/null \
                     | grep -o "\"sha\":\"[^\"]*\"" | head -1 | cut -d"\"" -f4)
               if [ "$sha" = "${{ github.sha }}" ]; then
                 echo "✓ deployed SHA matches on attempt $i: $sha"
                 exit 0
               fi
               echo "  attempt $i: sha=\"$sha\" — waiting 5s…"
               sleep 5
             done
             echo "✗ /api/version SHA never matched after 30s"
             exit 1'

      - name: Tail deploy log on failure
        if: failure()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'tail -100 ~/logs/deploy-dev-$(date +%F).log || true'
