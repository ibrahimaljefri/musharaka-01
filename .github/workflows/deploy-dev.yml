name: Deploy to dev.urrwah.com

# Triggers:
#   push to dev branch        → auto-deploy
#   manual via Actions UI     → workflow_dispatch
on:
  push:
    branches: [dev]
  workflow_dispatch:

# One dev deploy at a time. Don't cancel an in-progress deploy —
# rolling-cancel would leave the VPS in a half-applied state.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run deploy.sh dev on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash ~/deploy.sh dev'

      - name: Wait for app to be healthy (up to 30s)
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS https://dev.urrwah.com/api/health | grep -q '"status":"ok"'; then
              echo "✓ dev.urrwah.com is healthy on attempt $i"
              exit 0
            fi
            echo "  attempt $i: not ready yet, waiting 5s…"
            sleep 5
          done
          echo "✗ dev.urrwah.com health check failed after 30s"
          exit 1

      - name: Verify deployed SHA matches this commit
        run: |
          DEPLOYED=$(curl -fsS https://dev.urrwah.com/api/version | jq -r .sha)
          if [ "$DEPLOYED" != "${{ github.sha }}" ]; then
            echo "✗ /api/version returned '$DEPLOYED', expected '${{ github.sha }}'"
            exit 1
          fi
          echo "✓ deployed SHA matches: $DEPLOYED"

      - name: Tail deploy log on failure
        if: failure()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'tail -100 ~/logs/deploy-dev-$(date +%F).log || true'
