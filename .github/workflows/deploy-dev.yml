name: Deploy to dev.urrwah.com

# Triggers:
#   push to dev branch        → auto-deploy
#   manual via Actions UI     → workflow_dispatch
on:
  push:
    branches: [dev]
  workflow_dispatch:

# One dev deploy at a time. Don't cancel an in-progress deploy —
# rolling-cancel would leave the VPS in a half-applied state.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Ensure INTERNAL_KILL_KEY exists in the VPS server/.env.
      # This key protects the /api/internal/shutdown endpoint used to restart
      # the node process on CloudLinux/CageFS where pkill/pgrep are blocked.
      - name: Ensure INTERNAL_KILL_KEY in server .env
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'SERVER_ENV=~/repos/urrwah-dev/musharaka/server/.env
             if ! grep -q "^INTERNAL_KILL_KEY=" "$SERVER_ENV" 2>/dev/null; then
               KEY=$(head -c 32 /dev/urandom | base64 | tr -dc A-Za-z0-9 | head -c 40)
               echo "INTERNAL_KILL_KEY=$KEY" >> "$SERVER_ENV"
               echo "✓ generated INTERNAL_KILL_KEY (40-char random)"
             else
               echo "✓ INTERNAL_KILL_KEY already set"
             fi'

      # Kill the running node process BEFORE deploy.sh tries to start a new one.
      # pkill / pgrep / /proc-scanning all exit 255 on CloudLinux/CageFS.
      # Four escalating methods; any one success is sufficient.
      - name: Kill old process before deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set +e
             KILLED=0

             # Method 1: HTTP shutdown endpoint (works once new code has been deployed at least once)
             KILL_KEY=$(grep -oP "(?<=^INTERNAL_KILL_KEY=).+" \
               ~/repos/urrwah-dev/musharaka/server/.env 2>/dev/null || true)
             if [ -n "$KILL_KEY" ]; then
               HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
                 -X POST http://127.0.0.1:3002/api/internal/shutdown \
                 -H "x-kill-key: $KILL_KEY" 2>/dev/null || echo "000")
               if [ "$HTTP_STATUS" = "200" ]; then
                 echo "✓ http: shutdown endpoint accepted (HTTP $HTTP_STATUS)"
                 KILLED=1
                 sleep 2
               else
                 echo "  http: shutdown returned HTTP $HTTP_STATUS (old code or not running)"
               fi
             else
               echo "  http: INTERNAL_KILL_KEY not in .env — skipping"
             fi

             # Method 2: PID file written by the app on startup (new code writes ~/urrwah-dev-api.pid)
             if [ "$KILLED" -eq 0 ]; then
               PID_FILE="$HOME/urrwah-dev-api.pid"
               if [ -f "$PID_FILE" ]; then
                 OLD_PID=$(cat "$PID_FILE" 2>/dev/null)
                 if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                   kill -9 "$OLD_PID" 2>/dev/null \
                     && echo "✓ pidfile: killed PID $OLD_PID" \
                     || echo "⚠ pidfile: kill $OLD_PID failed"
                   KILLED=1
                 fi
                 rm -f "$PID_FILE"
               fi
             fi

             # Method 3: cPanel PassengerApps restart (disable + re-enable)
             # Works if the app is registered as a Passenger/Node.js Selector app.
             if [ "$KILLED" -eq 0 ]; then
               PA_LIST=$(uapi PassengerApps list_applications 2>/dev/null)
               if echo "$PA_LIST" | grep -qi "urrwah\|3002\|dev\.urrwah"; then
                 uapi PassengerApps disable_application domain=dev.urrwah.com 2>/dev/null \
                   && echo "✓ passenger: disabled dev.urrwah.com" || true
                 sleep 1
                 uapi PassengerApps enable_application domain=dev.urrwah.com 2>/dev/null \
                   && echo "✓ passenger: re-enabled dev.urrwah.com" || true
                 KILLED=1
               else
                 echo "  passenger: dev.urrwah.com not found in PassengerApps list"
                 echo "$PA_LIST" | head -20
               fi
             fi

             [ "$KILLED" -eq 1 ] && sleep 2 || echo "  no process killed — port may already be free or will fail EADDRINUSE"
             true'

      - name: Run deploy.sh dev on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash ~/deploy.sh dev'

      - name: Verify app is healthy on port 3002
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               result=$(curl -fsS http://127.0.0.1:3002/api/health 2>/dev/null || echo "fail")
               if echo "$result" | grep -q "\"status\":\"ok\""; then
                 echo "✓ dev backend healthy on attempt $i: $result"
                 exit 0
               fi
               echo "  attempt $i: $result — waiting 5s…"
               sleep 5
             done
             echo "✗ dev backend health check failed after 30s"
             exit 1'

      # Stamp the correct GIT_SHA into server .env.
      # readEnvKey() in index.js reads .env fresh on every /api/version request —
      # no restart needed for SHA to reflect after the process is running new code.
      - name: Stamp GIT_SHA into server .env
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'SERVER_ENV=~/repos/urrwah-dev/musharaka/server/.env
             if [ -f "$SERVER_ENV" ]; then
               grep -v -E "^(GIT_SHA|DEPLOYED_AT)=" "$SERVER_ENV" > "$SERVER_ENV.tmp" \
                 && mv "$SERVER_ENV.tmp" "$SERVER_ENV"
             fi
             echo "GIT_SHA=${{ github.sha }}" >> "$SERVER_ENV"
             echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$SERVER_ENV"
             echo "✓ stamped GIT_SHA=${{ github.sha }}"'

      # Wait for the app to come back up after the bounce, then verify SHA.
      # Use grep/cut to parse JSON; avoids depending on `node` being in SSH PATH.
      - name: Verify deployed SHA matches this commit
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               sha=$(curl -fsS http://127.0.0.1:3002/api/version 2>/dev/null \
                     | grep -o "\"sha\":\"[^\"]*\"" | head -1 | cut -d"\"" -f4)
               if [ "$sha" = "${{ github.sha }}" ]; then
                 echo "✓ deployed SHA matches on attempt $i: $sha"
                 exit 0
               fi
               echo "  attempt $i: sha=\"$sha\" — waiting 5s…"
               sleep 5
             done
             echo "✗ /api/version SHA never matched after 30s"
             exit 1'

      # Verify the dev backend can actually use DATABASE_URL after restart by
      # hitting one DB-touching endpoint. /api/terms is public + always-on,
      # so it's a clean smoke test for "did pg-pool connect successfully?".
      - name: Smoke-test DB connectivity via /api/terms
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5; do
               status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/api/terms) ;
               if [ "$status" = "200" ]; then
                 echo "✓ /api/terms 200 on attempt $i — DB pool is healthy" ;
                 exit 0 ;
               fi ;
               echo "  attempt $i: /api/terms HTTP $status — waiting 3s…" ;
               sleep 3 ;
             done ;
             echo "✗ /api/terms never returned 200 — DB connectivity issue" ;
             tail -40 ~/urrwah-dev-api.log 2>&1 ;
             exit 1'

      # ONE-SHOT: seed admin@admin.com on dev DB (idempotent — only inserts
      # when the user doesn't exist). Password = Aa@123456789.
      # Bcrypt hash is generated remotely via the app's bcryptjs.
      - name: Seed admin@admin.com on dev DB
        env:
          REMOTE_SCRIPT: |
            #!/usr/bin/env bash
            set -e
            SERVER_ENV=$HOME/repos/urrwah-dev/musharaka/server/.env
            DB_URL=$(grep -oP "(?<=^DATABASE_URL=).+" "$SERVER_ENV")
            cd $HOME/repos/urrwah-dev/musharaka/server
            # node isn't in $PATH by default on cPanel — find it via the
            # CloudLinux Node.js Selector path used by deploy.sh.
            NODE_BIN=$(ls /opt/alt/alt-nodejs*/root/usr/bin/node 2>/dev/null | sort -V | tail -1)
            test -n "$NODE_BIN" || { echo "[fatal] no node binary found under /opt/alt/alt-nodejs*"; exit 1; }
            echo "[ok] using $NODE_BIN"
            HASH=$($NODE_BIN -e 'console.log(require("bcryptjs").hashSync("Aa@123456789", 10))')
            test -n "$HASH" || { echo "[fatal] bcryptjs missing or hashing failed"; exit 1; }
            echo "[ok] bcrypt hash generated"
            cat > /tmp/seed_dev_admin.sql <<'SQL'
            \set ON_ERROR_STOP on
            INSERT INTO app_users (id, email, password_hash, full_name, email_confirmed_at,
                                   terms_accepted_at, created_by_admin)
            SELECT gen_random_uuid(), 'admin@admin.com', :'hash', 'Admin', now(), now(), false
            WHERE NOT EXISTS (SELECT 1 FROM app_users WHERE email = 'admin@admin.com');

            INSERT INTO super_admins (user_id)
            SELECT id FROM app_users WHERE email = 'admin@admin.com'
              AND id NOT IN (SELECT user_id FROM super_admins);

            SELECT email,
                   (id IN (SELECT user_id FROM super_admins)) AS is_super_admin,
                   terms_accepted_at IS NOT NULL              AS terms_accepted
              FROM app_users WHERE email = 'admin@admin.com';
            SQL
            psql "$DB_URL" -v hash="$HASH" -f /tmp/seed_dev_admin.sql
            rm -f /tmp/seed_dev_admin.sql
        run: |
          printf '%s' "$REMOTE_SCRIPT" | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cat > /tmp/seed_$$.sh && bash /tmp/seed_$$.sh && rm -f /tmp/seed_$$.sh'

      # ROOT-CAUSE FIX: ~/deploy.sh kills via
      #   pkill -9 -u "$USER" -f "node.*$SERVER_DIR/src/index.js"
      # which matches BOTH urrwah-dev AND urrwah-prod node processes (the
      # SERVER_DIR substring "musharaka/server" appears in both paths).
      # Result: deploying one env nukes the other.
      #
      # Patch the kill line to use REPO_DIR (env-specific path) so each env
      # only kills its own process. Idempotent — sed only replaces if the
      # broken pattern is still present.
      - name: Patch deploy.sh kill mechanism (env-specific)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'BEFORE=$(grep -c "pkill -9 -u \"\$USER\" -f \"node.*\$SERVER_DIR/src/index.js\"" ~/deploy.sh 2>/dev/null || echo 0) ;
             echo "matches before patch: $BEFORE" ;
             if [ "$BEFORE" -gt 0 ]; then
               cp ~/deploy.sh ~/deploy.sh.bak.$(date +%s) ;
               sed -i "s|pkill -9 -u \"\$USER\" -f \"node.*\$SERVER_DIR/src/index.js\"|pkill -9 -u \"\$USER\" -f \"node.*\$REPO_DIR/\$SERVER_DIR/src/index.js\"|g" ~/deploy.sh ;
               echo "[ok] patched kill line in ~/deploy.sh" ;
               grep -n "pkill" ~/deploy.sh ;
             else
               echo "[ok] kill line already patched (no replacement needed)" ;
               grep -n "pkill" ~/deploy.sh ;
             fi'

      # The shared ~/deploy.sh kills ALL node processes when starting one env,
      # so a dev deploy can leave urrwah.com (port 3001 / prod) without a
      # listener. Ensure prod is also running after every dev deploy.
      # Also re-writes the .htaccess proxy rule because deploy.sh's rsync
      # --delete wipes it from the docroot.
      - name: Ensure urrwah.com prod is also running
        run: |
          # Always re-write the proxy .htaccess (idempotent, costs nothing).
          # Apache vhost docroot for urrwah.com is ~/public_html/urrwah.com
          HTACCESS_CONTENT='RewriteEngine On
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          RewriteRule ^(.*)$ http://127.0.0.1:3001/$1 [P,L]
          '
          printf '%s' "$HTACCESS_CONTENT" | sed 's/^          //' | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'mkdir -p ~/public_html/urrwah.com && cat > ~/public_html/urrwah.com/.htaccess && echo "[ok] re-wrote prod .htaccess"'

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'PROD_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3001/api/health 2>/dev/null) ;
             echo "prod /api/health → $PROD_STATUS" ;
             if [ "$PROD_STATUS" != "200" ]; then
               echo "→ restarting prod node via deploy.sh prod" ;
               bash ~/deploy.sh prod 2>&1 | tail -30 ;
               for i in 1 2 3 4 5 6; do
                 s=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3001/api/health 2>/dev/null) ;
                 echo "  attempt $i: prod health=$s" ;
                 [ "$s" = "200" ] && exit 0 ;
                 sleep 4 ;
               done ;
               echo "✗ prod still not healthy" ;
               tail -30 ~/urrwah-prod-api.log 2>/dev/null || tail -30 ~/musharaka.log 2>/dev/null ;
               exit 1 ;
             fi ;
             echo "✓ prod is already healthy"'

          # Final external check via Apache (HTTPS → vhost → .htaccess → node)
          for i in 1 2 3 4 5; do
            s=$(curl -sS -o /dev/null -w "%{http_code}" -m 5 https://urrwah.com/api/health 2>/dev/null)
            body=$(curl -sS -m 5 https://urrwah.com/api/health 2>/dev/null | head -1)
            echo "  external https://urrwah.com/api/health → $s ($body)"
            [ "$s" = "200" ] && case "$body" in *'"status":"ok"'*) echo "✓ prod external health OK"; exit 0;; esac
            sleep 3
          done
          echo "✗ external prod health failed — Apache not proxying to node"
          exit 1

      # Likewise: deploy.sh prod kills dev. Re-verify dev is still up at end.
      - name: Re-verify dev still up after prod ensure
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'DEV_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3002/api/health 2>/dev/null) ;
             echo "dev /api/health → $DEV_STATUS" ;
             if [ "$DEV_STATUS" != "200" ]; then
               echo "→ dev was killed by prod deploy; restarting via deploy.sh dev" ;
               bash ~/deploy.sh dev 2>&1 | tail -30 ;
               for i in 1 2 3 4 5 6; do
                 s=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3002/api/health 2>/dev/null) ;
                 echo "  attempt $i: dev health=$s" ;
                 [ "$s" = "200" ] && exit 0 ;
                 sleep 4 ;
               done ;
               echo "✗ dev still not healthy" ;
               exit 1 ;
             fi ;
             echo "✓ dev is healthy"'


      - name: Tail deploy log on failure
        if: failure()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'tail -100 ~/logs/deploy-dev-$(date +%F).log || true'
