name: Deploy to dev.urrwah.com

# Triggers:
#   push to dev branch        → auto-deploy
#   manual via Actions UI     → workflow_dispatch
on:
  push:
    branches: [dev]
  workflow_dispatch:

# One dev deploy at a time. Don't cancel an in-progress deploy —
# rolling-cancel would leave the VPS in a half-applied state.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Ensure INTERNAL_KILL_KEY exists in the VPS server/.env.
      # This key protects the /api/internal/shutdown endpoint used to restart
      # the node process on CloudLinux/CageFS where pkill/pgrep are blocked.
      - name: Ensure INTERNAL_KILL_KEY in server .env
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'SERVER_ENV=~/repos/urrwah-dev/musharaka/server/.env
             if ! grep -q "^INTERNAL_KILL_KEY=" "$SERVER_ENV" 2>/dev/null; then
               KEY=$(head -c 32 /dev/urandom | base64 | tr -dc A-Za-z0-9 | head -c 40)
               echo "INTERNAL_KILL_KEY=$KEY" >> "$SERVER_ENV"
               echo "✓ generated INTERNAL_KILL_KEY (40-char random)"
             else
               echo "✓ INTERNAL_KILL_KEY already set"
             fi'

      # Kill the running node process BEFORE deploy.sh tries to start a new one.
      # pkill / pgrep / /proc-scanning all exit 255 on CloudLinux/CageFS.
      # Four escalating methods; any one success is sufficient.
      - name: Kill old process before deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'set +e
             KILLED=0

             # Method 1: HTTP shutdown endpoint (works once new code has been deployed at least once)
             KILL_KEY=$(grep -oP "(?<=^INTERNAL_KILL_KEY=).+" \
               ~/repos/urrwah-dev/musharaka/server/.env 2>/dev/null || true)
             if [ -n "$KILL_KEY" ]; then
               HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
                 -X POST http://127.0.0.1:3002/api/internal/shutdown \
                 -H "x-kill-key: $KILL_KEY" 2>/dev/null || echo "000")
               if [ "$HTTP_STATUS" = "200" ]; then
                 echo "✓ http: shutdown endpoint accepted (HTTP $HTTP_STATUS)"
                 KILLED=1
                 sleep 2
               else
                 echo "  http: shutdown returned HTTP $HTTP_STATUS (old code or not running)"
               fi
             else
               echo "  http: INTERNAL_KILL_KEY not in .env — skipping"
             fi

             # Method 2: PID file written by the app on startup (new code writes ~/urrwah-dev-api.pid)
             if [ "$KILLED" -eq 0 ]; then
               PID_FILE="$HOME/urrwah-dev-api.pid"
               if [ -f "$PID_FILE" ]; then
                 OLD_PID=$(cat "$PID_FILE" 2>/dev/null)
                 if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                   kill -9 "$OLD_PID" 2>/dev/null \
                     && echo "✓ pidfile: killed PID $OLD_PID" \
                     || echo "⚠ pidfile: kill $OLD_PID failed"
                   KILLED=1
                 fi
                 rm -f "$PID_FILE"
               fi
             fi

             # Method 3: cPanel PassengerApps restart (disable + re-enable)
             # Works if the app is registered as a Passenger/Node.js Selector app.
             if [ "$KILLED" -eq 0 ]; then
               PA_LIST=$(uapi PassengerApps list_applications 2>/dev/null)
               if echo "$PA_LIST" | grep -qi "urrwah\|3002\|dev\.urrwah"; then
                 uapi PassengerApps disable_application domain=dev.urrwah.com 2>/dev/null \
                   && echo "✓ passenger: disabled dev.urrwah.com" || true
                 sleep 1
                 uapi PassengerApps enable_application domain=dev.urrwah.com 2>/dev/null \
                   && echo "✓ passenger: re-enabled dev.urrwah.com" || true
                 KILLED=1
               else
                 echo "  passenger: dev.urrwah.com not found in PassengerApps list"
                 echo "$PA_LIST" | head -20
               fi
             fi

             [ "$KILLED" -eq 1 ] && sleep 2 || echo "  no process killed — port may already be free or will fail EADDRINUSE"
             true'

      - name: Run deploy.sh dev on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash ~/deploy.sh dev'

      - name: Verify app is healthy on port 3002
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               result=$(curl -fsS http://127.0.0.1:3002/api/health 2>/dev/null || echo "fail")
               if echo "$result" | grep -q "\"status\":\"ok\""; then
                 echo "✓ dev backend healthy on attempt $i: $result"
                 exit 0
               fi
               echo "  attempt $i: $result — waiting 5s…"
               sleep 5
             done
             echo "✗ dev backend health check failed after 30s"
             exit 1'

      # Stamp the correct GIT_SHA into server .env.
      # readEnvKey() in index.js reads .env fresh on every /api/version request —
      # no restart needed for SHA to reflect after the process is running new code.
      - name: Stamp GIT_SHA into server .env
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'SERVER_ENV=~/repos/urrwah-dev/musharaka/server/.env
             if [ -f "$SERVER_ENV" ]; then
               grep -v -E "^(GIT_SHA|DEPLOYED_AT)=" "$SERVER_ENV" > "$SERVER_ENV.tmp" \
                 && mv "$SERVER_ENV.tmp" "$SERVER_ENV"
             fi
             echo "GIT_SHA=${{ github.sha }}" >> "$SERVER_ENV"
             echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$SERVER_ENV"
             echo "✓ stamped GIT_SHA=${{ github.sha }}"'

      # Wait for the app to come back up after the bounce, then verify SHA.
      # Use grep/cut to parse JSON; avoids depending on `node` being in SSH PATH.
      - name: Verify deployed SHA matches this commit
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5 6; do
               sha=$(curl -fsS http://127.0.0.1:3002/api/version 2>/dev/null \
                     | grep -o "\"sha\":\"[^\"]*\"" | head -1 | cut -d"\"" -f4)
               if [ "$sha" = "${{ github.sha }}" ]; then
                 echo "✓ deployed SHA matches on attempt $i: $sha"
                 exit 0
               fi
               echo "  attempt $i: sha=\"$sha\" — waiting 5s…"
               sleep 5
             done
             echo "✗ /api/version SHA never matched after 30s"
             exit 1'

      # Verify the dev backend can actually use DATABASE_URL after restart by
      # hitting one DB-touching endpoint. /api/terms is public + always-on,
      # so it's a clean smoke test for "did pg-pool connect successfully?".
      - name: Smoke-test DB connectivity via /api/terms
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3 4 5; do
               status=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/api/terms) ;
               if [ "$status" = "200" ]; then
                 echo "✓ /api/terms 200 on attempt $i — DB pool is healthy" ;
                 exit 0 ;
               fi ;
               echo "  attempt $i: /api/terms HTTP $status — waiting 3s…" ;
               sleep 3 ;
             done ;
             echo "✗ /api/terms never returned 200 — DB connectivity issue" ;
             tail -40 ~/urrwah-dev-api.log 2>&1 ;
             exit 1'

      # ONE-SHOT: seed admin@admin.com on dev DB (idempotent).
      # Password = Aa@123456789. Hash generated on the GH runner.
      - name: Seed admin@admin.com on dev DB
        run: |
          # Generate bcrypt hash on the GH runner (has python3 + bcrypt easily).
          pip install --quiet bcrypt 2>&1 | tail -3 || true
          HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'Aa@123456789', bcrypt.gensalt(10)).decode())")
          test -n "$HASH" || { echo "[fatal] could not generate hash"; exit 1; }
          echo "[ok] hash generated len=${#HASH}"

          cat > /tmp/seed_dev_admin.sql <<'SQL'
          \set ON_ERROR_STOP on
          INSERT INTO app_users (id, email, password_hash, full_name, email_confirmed_at,
                                 terms_accepted_at, created_by_admin)
          SELECT gen_random_uuid(), 'admin@admin.com', :'hash', 'Admin', now(), now(), false
          WHERE NOT EXISTS (SELECT 1 FROM app_users WHERE email = 'admin@admin.com');

          INSERT INTO super_admins (user_id)
          SELECT id FROM app_users WHERE email = 'admin@admin.com'
            AND id NOT IN (SELECT user_id FROM super_admins);

          SELECT email,
                 (id IN (SELECT user_id FROM super_admins)) AS is_super_admin,
                 terms_accepted_at IS NOT NULL              AS terms_accepted
            FROM app_users WHERE email = 'admin@admin.com';
          SQL

          # Ship SQL + hash to the VPS, run psql there.
          scp -o StrictHostKeyChecking=accept-new /tmp/seed_dev_admin.sql \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/seed_dev_admin.sql

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "DB_URL=\$(grep -oP \"(?<=^DATABASE_URL=).+\" \$HOME/repos/urrwah-dev/musharaka/server/.env) ; \
             psql \"\$DB_URL\" -v hash='$HASH' -f /tmp/seed_dev_admin.sql && \
             rm -f /tmp/seed_dev_admin.sql"
          rm -f /tmp/seed_dev_admin.sql

      # ROOT-CAUSE FIX: ~/deploy.sh kills via
      #   pkill -9 -u "$USER" -f "node.*$SERVER_DIR/src/index.js"
      # which matches BOTH urrwah-dev AND urrwah-prod node processes (the
      # SERVER_DIR substring "musharaka/server" appears in both paths).
      # Result: deploying one env nukes the other.
      #
      # Patch the kill line to use REPO_DIR (env-specific path) so each env
      # only kills its own process. Idempotent — sed only replaces if the
      # broken pattern is still present.
      - name: Patch deploy.sh kill mechanism (env-specific)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'BEFORE=$(grep -c "pkill -9 -u \"\$USER\" -f \"node.*\$SERVER_DIR/src/index.js\"" ~/deploy.sh 2>/dev/null || echo 0) ;
             echo "matches before patch: $BEFORE" ;
             if [ "$BEFORE" -gt 0 ]; then
               cp ~/deploy.sh ~/deploy.sh.bak.$(date +%s) ;
               sed -i "s|pkill -9 -u \"\$USER\" -f \"node.*\$SERVER_DIR/src/index.js\"|pkill -9 -u \"\$USER\" -f \"node.*\$REPO_DIR/\$SERVER_DIR/src/index.js\"|g" ~/deploy.sh ;
               echo "[ok] patched kill line in ~/deploy.sh" ;
               grep -n "pkill" ~/deploy.sh ;
             else
               echo "[ok] kill line already patched (no replacement needed)" ;
               grep -n "pkill" ~/deploy.sh ;
             fi'

      # ONE-SHOT: provision a strong SMTP password for info@urrwah.com via
      # cPanel uapi, write it to BOTH prod + dev .env files, restart node so
      # the app re-reads .env, then send a real test email through the
      # authenticated /api/auth/forgot-password flow.
      - name: Set SMTP password + send authenticated test email
        env:
          REMOTE_SCRIPT: |
            #!/usr/bin/env bash
            set -e
            EMAIL_USER='info'
            EMAIL_DOMAIN='urrwah.com'
            EMAIL_FULL="${EMAIL_USER}@${EMAIL_DOMAIN}"

            # 1. Generate a strong 32-char password (alphanumeric + safe symbols
            #    that DON'T break .env parsing or URL encoding: no '#' '+' or '$').
            NEW_PASS=$(head -c 64 /dev/urandom | base64 | tr -dc 'A-Za-z0-9_-' | head -c 32)
            test ${#NEW_PASS} -eq 32 || { echo "[fatal] could not generate password"; exit 1; }
            echo "[ok] generated 32-char SMTP password"

            # 2. Show what cPanel email accounts exist (sanity-check that
            #    info@urrwah.com actually exists before resetting).
            echo "=== cPanel email accounts (UAPI list) ==="
            uapi Email list_pops 2>&1 | grep -E "email|domain|user" | head -10 || true
            echo ""

            # 3. Reset the password on the cPanel email account.
            echo "=== resetting password for $EMAIL_FULL ==="
            uapi Email passwd_pop \
              email="$EMAIL_USER" \
              domain="$EMAIL_DOMAIN" \
              password="$NEW_PASS" 2>&1 | tail -10 \
              || { echo "[fatal] uapi passwd_pop failed"; exit 1; }
            echo ""

            # 4. Update both prod + dev .env files. Idempotent: replaces the
            #    SMTP_PASS line if present, appends if missing.
            for ENV_FILE in \
              "$HOME/repos/urrwah-prod/musharaka/server/.env" \
              "$HOME/repos/urrwah-dev/musharaka/server/.env"
            do
              if [ ! -f "$ENV_FILE" ]; then echo "  skip (missing): $ENV_FILE"; continue; fi
              cp "$ENV_FILE" "$ENV_FILE.bak.$(date +%s)"
              if grep -q "^SMTP_PASS=" "$ENV_FILE"; then
                sed -i "s|^SMTP_PASS=.*|SMTP_PASS=$NEW_PASS|" "$ENV_FILE"
                echo "[ok] replaced SMTP_PASS in $ENV_FILE"
              else
                echo "SMTP_PASS=$NEW_PASS" >> "$ENV_FILE"
                echo "[ok] appended SMTP_PASS to $ENV_FILE"
              fi
              # Also ensure SMTP_USER/HOST/PORT/SECURE/FROM are sane on dev.
              grep -q "^SMTP_USER=" "$ENV_FILE" || echo "SMTP_USER=$EMAIL_FULL" >> "$ENV_FILE"
              grep -q "^SMTP_HOST=" "$ENV_FILE" || echo "SMTP_HOST=mail.$EMAIL_DOMAIN" >> "$ENV_FILE"
              grep -q "^SMTP_PORT=" "$ENV_FILE" || echo "SMTP_PORT=587" >> "$ENV_FILE"
              grep -q "^SMTP_SECURE=" "$ENV_FILE" || echo "SMTP_SECURE=false" >> "$ENV_FILE"
              grep -q "^SMTP_FROM=" "$ENV_FILE" || echo "SMTP_FROM=\"عروة\" <$EMAIL_FULL>" >> "$ENV_FILE"
            done

            # 5. Restart both node processes via shutdown endpoints so the
            #    new SMTP_PASS is picked up. Falls back to PID-file kill.
            echo ""
            echo "=== restarting node processes ==="
            for PORT in 3001 3002; do
              ENV_DIR="$([ "$PORT" = "3001" ] && echo "urrwah-prod" || echo "urrwah-dev")"
              KEY=$(grep -oP "(?<=^INTERNAL_KILL_KEY=).+" "$HOME/repos/$ENV_DIR/musharaka/server/.env" 2>/dev/null || true)
              if [ -n "$KEY" ]; then
                CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
                  http://127.0.0.1:$PORT/api/internal/shutdown \
                  -H "x-kill-key: $KEY" 2>/dev/null || echo 000)
                echo "  port $PORT shutdown HTTP $CODE"
              fi
            done
            sleep 5

            # Re-run deploy.sh for both envs to bring node back up. The
            # shared deploy.sh uses pkill (already env-specific from our
            # earlier patch), so each call starts only its own process.
            bash ~/deploy.sh prod 2>&1 | tail -10
            sleep 2
            bash ~/deploy.sh dev  2>&1 | tail -10
            sleep 4

            # 6. Verify both envs back up.
            echo ""
            echo "=== verify both envs healthy ==="
            for PORT in 3001 3002; do
              for i in 1 2 3 4 5; do
                CODE=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT/api/health 2>/dev/null)
                [ "$CODE" = "200" ] && { echo "  port $PORT: healthy"; break; }
                sleep 3
              done
            done

            # 7. Send a real test through the authenticated app on prod.
            echo ""
            echo "=== test send via prod auth /forgot-password (requires user) ==="
            # /forgot-password silently 200s for unknown users, so use the
            # standalone send via nodemailer (matches the app's exact config).
            cd $HOME/repos/urrwah-prod/musharaka/server
            NODE_BIN=$(ls /opt/alt/alt-nodejs*/root/usr/bin/node 2>/dev/null | sort -V | tail -1)
            cat > smtp_send_real.js <<'JS'
            const fs   = require('fs')
            const path = require('path')
            const env  = {}
            for (const raw of fs.readFileSync(path.join(__dirname,'.env'),'utf8').split('\n')) {
              const line = raw.replace(/\r$/,'')
              if (!line || line.startsWith('#')) continue
              const eq = line.indexOf('=')
              if (eq < 1) continue
              let v = line.slice(eq+1)
              if ((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'"))) v = v.slice(1,-1)
              env[line.slice(0,eq).trim()] = v
            }
            console.log('[debug] SMTP_PASS_len=' + (env.SMTP_PASS ? env.SMTP_PASS.length : 0))
            const t = require('nodemailer').createTransport({
              host: env.SMTP_HOST, port: parseInt(env.SMTP_PORT||'587'),
              secure: env.SMTP_SECURE === 'true',
              auth: { user: env.SMTP_USER, pass: env.SMTP_PASS },
            })
            t.verify().then(() => {
              console.log('[ok] verify() passed — auth accepted')
              return t.sendMail({
                from: env.SMTP_FROM || `"عروة" <${env.SMTP_USER}>`,
                to:   'ibrahimaljefri90@gmail.com',
                subject: '✅ عروة — اختبار SMTP مع مصادقة (' + new Date().toISOString() + ')',
                html: `<div dir="rtl" style="font-family:sans-serif;background:#f9fafb;padding:24px">
                  <h2 style="color:#ca8a04">SMTP مع مصادقة كاملة — عروة</h2>
                  <p>تم إعداد كلمة مرور SMTP جديدة وإعادة تشغيل خادم البريد بنجاح.</p>
                  <p>هذه الرسالة أُرسلت عبر <code>${env.SMTP_HOST}:${env.SMTP_PORT}</code>
                     بالحساب <code>${env.SMTP_USER}</code>.</p>
                  <p style="color:#6b7280;font-size:13px;margin-top:24px">
                    أُرسلت في: ${new Date().toISOString()}<br>
                    عبر: urrwah.com (production)
                  </p>
                </div>`
              })
            }).then(info => {
              console.log('[ok] delivered: ' + info.messageId)
              console.log('[ok] response: ' + (info.response||''))
              process.exit(0)
            }).catch(err => {
              console.error('[fail] ' + (err.message||err) + ' code=' + (err.code||''))
              process.exit(1)
            })
            JS
            "$NODE_BIN" smtp_send_real.js
            rm -f smtp_send_real.js

            echo ""
            echo "[done] SMTP password set on cPanel + propagated to both .env files"
            echo "[done] new password (32 chars) — saved only in .env files on the VPS"
        run: |
          printf '%s' "$REMOTE_SCRIPT" | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cat > /tmp/smtpset_$$.sh && bash /tmp/smtpset_$$.sh; rc=$?; rm -f /tmp/smtpset_$$.sh; exit $rc'

      # ONE-SHOT (kept for reference): unauthenticated localhost relay test.
      # No longer needed now that we have authenticated SMTP.
      - name: SMTP smoke test (send to ibrahimaljefri90@gmail.com)
        if: false
        env:
          REMOTE_SCRIPT: |
            #!/usr/bin/env bash
            set -e
            SERVER_ENV=$HOME/repos/urrwah-prod/musharaka/server/.env
            cd $HOME/repos/urrwah-prod/musharaka/server

            # Show SMTP config (with password redacted) so we can see what's wired up.
            echo "=== prod .env SMTP config (redacted) ==="
            grep -E "^(SMTP_HOST|SMTP_PORT|SMTP_SECURE|SMTP_USER|SMTP_FROM|APP_URL)=" "$SERVER_ENV"
            # Show how SMTP_PASS line LOOKS (length only, never the value)
            PASS_LINE=$(grep "^SMTP_PASS=" "$SERVER_ENV" || echo "")
            PASS_VAL=${PASS_LINE#SMTP_PASS=}
            echo "SMTP_PASS line length=${#PASS_LINE} value-length=${#PASS_VAL}"
            echo "=== bytes around SMTP_PASS ==="
            grep -B 1 -A 1 "^SMTP_PASS" "$SERVER_ENV" | wc -l
            echo ""

            # node isn't on $PATH for non-interactive shells — use the cPanel
            # nodeenv binary directly. Pick the highest available alt-nodejs.
            NODE_BIN=$(ls /opt/alt/alt-nodejs*/root/usr/bin/node 2>/dev/null | sort -V | tail -1)
            test -n "$NODE_BIN" || { echo "[fatal] no node binary found"; exit 1; }
            echo "=== using $NODE_BIN ==="
            "$NODE_BIN" --version

            # Run the test send. Loads .env via dotenv (server already does it),
            # then uses nodemailer directly with the same config the app uses.
            echo "=== sending test email ==="
            cat > /tmp/smtp_test.js <<'JS'
            // Parse .env ourselves — dotenv truncates on '#' which breaks
            // SMTP_PASS values that contain it. Read raw lines and split on
            // the FIRST '=' only. Strip wrapping quotes if any. Strip CR for
            // Windows-style line endings.
            const fs   = require('fs')
            const path = require('path')
            const env  = {}
            try {
              const txt = fs.readFileSync(path.join(__dirname, '.env'), 'utf8')
              for (const raw of txt.split('\n')) {
                const line = raw.replace(/\r$/, '')
                if (!line || line.startsWith('#')) continue
                const eq = line.indexOf('=')
                if (eq < 1) continue
                const k = line.slice(0, eq).trim()
                let   v = line.slice(eq + 1)
                // Strip wrapping quotes (single or double) if balanced
                if ((v.startsWith('"')  && v.endsWith('"'))  ||
                    (v.startsWith("'")  && v.endsWith("'")))  v = v.slice(1, -1)
                env[k] = v
              }
            } catch (e) {
              console.error('[fail] could not read .env: ' + e.message)
              process.exit(1)
            }
            console.log('[debug] SMTP_USER=' + (env.SMTP_USER || '(empty)'))
            console.log('[debug] SMTP_HOST=' + (env.SMTP_HOST || '(empty)'))
            console.log('[debug] SMTP_PORT=' + (env.SMTP_PORT || '(empty)'))
            console.log('[debug] SMTP_PASS_len=' + (env.SMTP_PASS ? env.SMTP_PASS.length : 0))
            // Promote to process.env so the rest of the script works unchanged.
            for (const k of Object.keys(env)) process.env[k] = env[k]
            const nodemailer = require('nodemailer')

            // If no SMTP_PASS, try unauthenticated localhost relay (cPanel
            // typically allows it from the same machine). This is a real
            // fallback — many cPanel-hosted apps run this way.
            const useAuth = !!process.env.SMTP_PASS
            console.log('[debug] auth mode = ' + (useAuth ? 'PLAIN (host SMTP)' : 'localhost relay (no auth)'))

            const config = useAuth
              ? {
                  host:   process.env.SMTP_HOST,
                  port:   parseInt(process.env.SMTP_PORT || '587'),
                  secure: process.env.SMTP_SECURE === 'true',
                  auth:   { user: process.env.SMTP_USER, pass: process.env.SMTP_PASS },
                }
              : {
                  host:        '127.0.0.1',
                  port:        25,
                  secure:      false,
                  ignoreTLS:   true,
                  tls:         { rejectUnauthorized: false },
                }
            const t = nodemailer.createTransport(config)
            t.verify().then(() => {
              console.log('[ok] transporter.verify() passed — server reachable')
              return t.sendMail({
                from:    process.env.SMTP_FROM || `"عروة" <${process.env.SMTP_USER}>`,
                to:      'ibrahimaljefri90@gmail.com',
                subject: '✅ SMTP test — عروة (' + new Date().toISOString() + ')',
                html:    `<div dir="rtl" style="font-family:sans-serif;background:#f9fafb;padding:24px">
                  <h2 style="color:#ca8a04">SMTP test — عروة</h2>
                  <p>هذه رسالة اختبار من خادم عروة (urrwah.com) للتأكد من أن البريد يعمل بشكل صحيح.</p>
                  <p style="color:#6b7280;font-size:13px">
                    Sent at: ${new Date().toISOString()}<br>
                    From: ${process.env.SMTP_FROM || process.env.SMTP_USER}<br>
                    Host: ${process.env.SMTP_HOST}:${process.env.SMTP_PORT}<br>
                    Secure: ${process.env.SMTP_SECURE}
                  </p>
                </div>`,
              })
            }).then(info => {
              console.log('[ok] sent! messageId=' + info.messageId)
              console.log('[ok] response=' + (info.response || ''))
              process.exit(0)
            }).catch(err => {
              console.error('[fail] ' + (err.message || err))
              if (err.code) console.error('[fail] code=' + err.code)
              if (err.response) console.error('[fail] response=' + err.response)
              process.exit(1)
            })
            JS
            # Move script into server dir so node resolves dotenv + nodemailer
            # via the regular node_modules lookup.
            mv /tmp/smtp_test.js $HOME/repos/urrwah-prod/musharaka/server/smtp_test.js
            cd $HOME/repos/urrwah-prod/musharaka/server
            "$NODE_BIN" smtp_test.js
            rm -f smtp_test.js
        run: |
          printf '%s' "$REMOTE_SCRIPT" | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cat > /tmp/smtp_$$.sh && bash /tmp/smtp_$$.sh; rc=$?; rm -f /tmp/smtp_$$.sh; exit $rc'

      # The shared ~/deploy.sh kills ALL node processes when starting one env,
      # so a dev deploy can leave urrwah.com (port 3001 / prod) without a
      # listener. Ensure prod is also running after every dev deploy.
      # Also re-writes the .htaccess proxy rule because deploy.sh's rsync
      # --delete wipes it from the docroot.
      - name: Ensure urrwah.com prod is also running
        run: |
          # Always re-write the proxy .htaccess (idempotent, costs nothing).
          # Apache vhost docroot for urrwah.com is ~/public_html/urrwah.com
          HTACCESS_CONTENT='RewriteEngine On
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          RewriteRule ^(.*)$ http://127.0.0.1:3001/$1 [P,L]
          '
          printf '%s' "$HTACCESS_CONTENT" | sed 's/^          //' | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'mkdir -p ~/public_html/urrwah.com && cat > ~/public_html/urrwah.com/.htaccess && echo "[ok] re-wrote prod .htaccess"'

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'PROD_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3001/api/health 2>/dev/null) ;
             echo "prod /api/health → $PROD_STATUS" ;
             if [ "$PROD_STATUS" != "200" ]; then
               echo "→ restarting prod node via deploy.sh prod" ;
               bash ~/deploy.sh prod 2>&1 | tail -30 ;
               for i in 1 2 3 4 5 6; do
                 s=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3001/api/health 2>/dev/null) ;
                 echo "  attempt $i: prod health=$s" ;
                 [ "$s" = "200" ] && exit 0 ;
                 sleep 4 ;
               done ;
               echo "✗ prod still not healthy" ;
               tail -30 ~/urrwah-prod-api.log 2>/dev/null || tail -30 ~/musharaka.log 2>/dev/null ;
               exit 1 ;
             fi ;
             echo "✓ prod is already healthy"'

          # Final external check via Apache (HTTPS → vhost → .htaccess → node)
          for i in 1 2 3 4 5; do
            s=$(curl -sS -o /dev/null -w "%{http_code}" -m 5 https://urrwah.com/api/health 2>/dev/null)
            body=$(curl -sS -m 5 https://urrwah.com/api/health 2>/dev/null | head -1)
            echo "  external https://urrwah.com/api/health → $s ($body)"
            [ "$s" = "200" ] && case "$body" in *'"status":"ok"'*) echo "✓ prod external health OK"; exit 0;; esac
            sleep 3
          done
          echo "✗ external prod health failed — Apache not proxying to node"
          exit 1

      # Likewise: deploy.sh prod kills dev. Re-verify dev is still up at end.
      - name: Re-verify dev still up after prod ensure
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'DEV_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3002/api/health 2>/dev/null) ;
             echo "dev /api/health → $DEV_STATUS" ;
             if [ "$DEV_STATUS" != "200" ]; then
               echo "→ dev was killed by prod deploy; restarting via deploy.sh dev" ;
               bash ~/deploy.sh dev 2>&1 | tail -30 ;
               for i in 1 2 3 4 5 6; do
                 s=$(curl -sS -o /dev/null -w "%{http_code}" -m 3 http://127.0.0.1:3002/api/health 2>/dev/null) ;
                 echo "  attempt $i: dev health=$s" ;
                 [ "$s" = "200" ] && exit 0 ;
                 sleep 4 ;
               done ;
               echo "✗ dev still not healthy" ;
               exit 1 ;
             fi ;
             echo "✓ dev is healthy"'


      - name: Tail deploy log on failure
        if: failure()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'tail -100 ~/logs/deploy-dev-$(date +%F).log || true'
